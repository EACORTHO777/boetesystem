<!DOCTYPE html>
<html lang="sv">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BÖTESYSTEM</title>
  <link rel="stylesheet" href="styles.css" />

  <!-- App icons / favicon -->
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="32x32" href="/icons/favicon-32x32.png">
  <link rel="icon" type="image/png" sizes="16x16" href="/icons/favicon-16x16.png">
  <link rel="manifest" href="/site.webmanifest">
  <link rel="mask-icon" href="/icons/safari-pinned-tab.svg" color="#2563eb">
  <meta name="theme-color" content="#ffffff">
</head>
<body>

<header class="app-header">
  <img src="logo23.png" alt="BIK logga" class="app-logo" />
</header>

<!-- 1️⃣ TOTALSUMMA (OBETALT) – HÖGST UPP -->
<section>
  <h2>📊 Totalsumma (obetalt)</h2>
  <ul id="totalsList"></ul>
</section>

<!-- 2️⃣ LÄGG BOT -->
<section>
  <h2>💸 Lägg bot</h2>

  <input
    id="playerSearch"
    placeholder="Sök spelare"
    autocomplete="off"
    required
  />

  <ul id="playerResults"></ul>

  <form id="fineForm">
    <input id="amount" type="number" placeholder="Summa (kr)" required />
    <input
      id="reason"
      placeholder="Anledning (välj eller skriv själv)"
      autocomplete="off"
    />
    <ul id="reasonResults"></ul>
    <button type="submit">Lägg till bot</button>
  </form>
</section>

<!-- 3️⃣ LAGKASSA -->
<section>
  <h2>🏦 Lagkassa</h2>
  <p id="teamPot" style="font-size: 1.4rem; font-weight: bold;">
    0 kr
  </p>

  <!-- Uttag-formulär -->
  <form id="withdrawalForm" style="margin-top: 16px; border-top: 1px solid #e2e8f0; padding-top: 16px;">
    <h3 style="margin: 0 0 12px; font-size: 1rem; color: #374151;">Ta ut pengar ur kassan</h3>
    <input id="withdrawalAmount" type="number" placeholder="Summa (kr)" required />
    <input id="withdrawalReason" type="text" placeholder="Vad används pengarna till?" autocomplete="off" required />
    <button type="submit" id="withdrawalBtn" style="background: #dc2626;">Registrera uttag</button>
  </form>

  <!-- Uttags-historik accordion -->
  <div style="margin-top: 16px; border-top: 1px solid #e2e8f0; padding-top: 12px;">
    <button type="button" id="toggleWithdrawals" style="background: #f1f5f9; color: #374151; font-weight: 600; font-size: 0.95rem; padding: 10px 14px; border-radius: 10px; display: flex; justify-content: space-between; align-items: center;">
      <span>📋 Uttags-historik</span>
      <span id="withdrawalChevron">▾</span>
    </button>
    <ul id="withdrawalsList" style="display: none; list-style: none; padding: 0; margin: 8px 0 0;"></ul>
  </div>
</section>

<!-- 4️⃣ TOP 3 -->
<section>
  <h2>🏆 Top 3 – Mest böter</h2>
  <ul id="topThreeList"></ul>
</section>

<!-- HISTORIK (MODAL) -->
<section id="historySection" style="display:none">
  <h2 id="historyTitle">📜 Historik</h2>
  <ul id="historyList"></ul>
  <button id="closeHistory">Stäng</button>
</section>

<script type="module" src="script.js"></script>
</body>
</html>
